<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sala 205</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="login-title">Admin Login</h1>
                <p class="login-subtitle">Gerencie contas e comentários</p>
            </div>
            <form id="adminLoginForm">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="adminUser" class="input-field" placeholder="Usuário" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="adminPass" class="input-field" placeholder="Senha" required>
                </div>
                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Acessar Admin
                </button>
            </form>
            <a href="../../index.html" class="login-link">
                <i class="fas fa-home"></i> Voltar ao Anexo
            </a>
            <div id="loginError" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i> Credenciais incorretas!
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-shield-alt" style="font-size: 2rem; color: #3b82f6;"></i>
                <h2>Painel Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-tab="comments">
                    <i class="fas fa-comments"></i>
                    <span>Comentários</span>
                </button>
                <button class="nav-btn" data-tab="users">
                    <i class="fas fa-users"></i>
                    <span>Contas</span>
                </button>
            </nav>
            <button id="logoutBtn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                Sair
            </button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Tab: Comentários -->
            <div id="tab-comments" class="tab-content active">
                <div class="tab-header">
                    <h1><i class="fas fa-comments"></i> Gerenciar Comentários</h1>
                    <div class="tab-actions">
                        <span id="comments-count" class="count-badge">0</span>
                        <button id="refresh-comments" class="refresh-btn">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div id="comments-list" class="list-container">
                    Carregando...
                </div>
            </div>

            <!-- Tab: Contas -->
            <div id="tab-users" class="tab-content">
                <div class="tab-header">
                    <h1><i class="fas fa-users"></i> Gerenciar Contas</h1>
                    <div class="tab-actions">
                        <span id="users-count" class="count-badge">0</span>
                    </div>
                </div>
                <div id="users-list" class="list-container">
                    Carregando...
                </div>
            </div>
        </main>
    </div>
</body>
</html>
