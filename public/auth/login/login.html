<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sala 205</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="/auth/login/login.js" defer></script>
    <link rel="shortcut icon" href="/image/icon.png" type="image/x-icon">
</head>

<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%), url('/image/anexoImagem.png') center/cover; background-blend-mode: overlay; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;">

    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 3rem; backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);">
 
        <div style="text-align: center; margin-bottom: 2.5rem;">

            <i class="fas fa-sign-in-alt" style="font-size: 3rem; color: #ffffff; margin-bottom: 1rem;"></i>

            <h1 style="font-size: 2rem; font-weight: 700; color: white; margin-bottom: 0.5rem;">
                Bem-vindo de volta
            </h1>

            <p style="color: rgba(255,255,255,0.8); font-size: 1.1rem;">
                Faça login para continuar
            </p>

        </div>

        <form id="formLogin">

            <div style="margin-bottom: 1.5rem;">
                <input type="text" id="nome" placeholder="Nome de usuário" required style="width: 100%; padding: 1.2rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.4); border-radius: 16px; color: #ffffff; font-size: 1rem; transition: all 0.3s; backdrop-filter: blur(10px);" autocomplete="username">
            </div>

            <div style="margin-bottom: 2rem;">
                <input type="password" id="senha" placeholder="Senha" required style="width: 100%; padding: 1.2rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.4); border-radius: 16px; color: #ffffff; font-size: 1rem; transition: all 0.3s; backdrop-filter: blur(10px);" autocomplete="current-password">
            </div>

            <div id="formError" style="display: none; padding: 1rem; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; border-radius: 8px; color: #fca5a5; margin-bottom: 1.5rem; text-align: center; font-size: 0.95rem;"></div>

            <button type="submit" style="width: 100%; background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%); color: #667eea; border: none; padding: 1.2rem; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.2);">
                <i class="fas fa-arrow-right"></i> Entrar
            </button>

        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.8);">
            Não tem conta? <a href="/auth/cadastro/cadastro.html" style="color: #ffffff; font-weight: 600;">Cadastre-se</a>
        </p>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <a href="/" style="flex: 1; text-align: center; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 1rem; border-radius: 12px; text-decoration: none; font-weight: 500; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>

        <p id="formError" style="color: #ff9999; text-align: center; margin-top: 1rem; display: none;"></p>

    </div>
</body>
</html>
