<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sala 205</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../index.css">
    <script src="cadastro.js" defer></script>
</head>
<body style="background: linear-gradient(145deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;">
    <div class="glass-card" style="max-width: 450px; width: 100%; padding: 3rem; backdrop-filter: blur(20px); background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <i class="fas fa-user-plus" style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;"></i>
            <h1 style="font-size: 2rem; font-weight: 700; color: white; margin-bottom: 0.5rem;">Criar Conta</h1>
            <p style="color: rgba(255,255,255,0.8); font-size: 1.1rem;">Junte-se à Sala 205</p>
        </div>
        <form id="formCadastro">
            <div style="margin-bottom: 1.5rem;">
                <input type="text" id="nome" placeholder="Nome de usuário" required style="width: 100%; padding: 1.2rem; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 16px; color: white; font-size: 1rem; transition: all 0.3s; backdrop-filter: blur(10px);">
            </div>
            <div style="margin-bottom: 2rem;">
                <input type="password" id="senha" placeholder="Senha" required style="width: 100%; padding: 1.2rem; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 16px; color: white; font-size: 1rem; transition: all 0.3s; backdrop-filter: blur(10px);">
            </div>
            <button type="submit" style="width: 100%; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 1.2rem; border-radius: 16px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(16,185,129,0.4);">
                <i class="fas fa-check"></i> Cadastrar
            </button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: rgba(255,255,255,0.7);">
            Já tem conta? <a href="../login/login.html" style="color: #3b82f6; font-weight: 500;">Faça login</a>
        </p>
        <p id="cadastroError" style="color: #f87171; text-align: center; margin-top: 1rem; display: none;"></p>
    </div>
</body>
</html>
