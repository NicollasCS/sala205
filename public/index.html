<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>205 - Anexo</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <script src="index.js" defer></script>
</head>
<body>

    <section id="secaoTopo" class="center texto">
        <div id="divTopo">
            <h1>Sala 205 - Anexo</h1>
            <p>Irmã Maria Teresa (EEBIMT)</p>
        </div>
        <button type="button" id="botaoLogin">Login</button>
    </section>
    <div class="container center">
        <button type="button" id="conhecer">Conheça mais sobre</button>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h2>Faça seu login</h2>
    
            <button onclick="logar()" class="buttonPopup">Já tenho uma conta</button>
            <button onclick="criarConta()" class="buttonPopup">Não tenho uma conta</button>
            <button onclick="fecharPopup()" class="buttonPopup">Mais tarde</button>
        </div>
    </div>

    <section id="secao2">
        <div class="container divComentarios">
            <h2>Comentários:</h2>

            <div id="comentariosExistentes"></div>

            <div id="comentarioForm" class="comentario-form">
                <div style="position:relative;">
                  <textarea id="novoComentario" placeholder="Escreva seu comentário... (máx 120 chars)" rows="4" maxlength="120"></textarea>
                  <small id="charCount" style="position:absolute; bottom:5px; right:10px; color:#666; font-size:0.8rem;">0/120</small>
                </div>
                <button id="btnEnviarComentario" type="button">Enviar comentário</button>
            </div>

            <div id="mensagemSemConta" class="mensagem-erro" style="display:none;">
                Você precisa estar logado para comentar. <a href="./auth/cadastro/cadastro.html">Cadastre-se</a> ou <a href="./auth/login/login.html">faça login</a>.
            </div>
        </div>
    </section>

    <!-- Floating Comments Toggle Button -->
    <button id="toggleCommentsBtn" class="floating-btn" title="Abrir/Fechar Comentários">
        <i class="fas fa-comments"></i>
        <span class="btn-text">Comentários</span>
    </button>

</body>
</html>
